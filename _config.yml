name: Emet Overman
title: Emet Overman
lang: en-US

lightavatar: /assets/images/emoverman-logo.png
darkavatar: /assets/images/emoverman-logo.png

tagline: "IQ too high, altruism too effective, time preference too low, circle too expanded"
description: Personal website and writing archive for Emet Overman, built with Jekyll and adapted from the brutalist-blog theme.

url: https://emetoverman.github.io
baseurl: ""

author: Emet Overman
logo: /assets/images/emoverman-logo.png
google_analytics:

permalink: /:year/:month/:day/:title/
markdown: kramdown

footer-links:
  email:
  facebook:
  github: EmetOverman
  instagram:
  linkedin:
  rss: enabled
  twitter: EmOverman

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: posts
    values:
      author: Emet Overman

exclude:
  - README.md
  - vendor
  - .bundle
